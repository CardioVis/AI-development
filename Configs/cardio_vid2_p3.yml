#-------------------------------fea2_p10 (Label Studio JSON + train_from_lsjson)--------------------------------
# Chuẩn id trong mask .npy khớp TAG_TO_CLASS ở prepare_cardio_data_from_labelstudio_json.py
# num_classes = max(id) + 1 = 10 + 1 = 11 (gồm nền 0).
# Lưu ý: sau filter_and_refold_labeled_data.py đã xóa mẫu có class 9 (Pericardial stay sutures)
# và mẫu mask chỉ 2 unique — id 9 có thể không còn xuất hiện trong data, nhưng vẫn giữ 11 lớp
# vì mask vẫn dùng id=10 (Pericardium boundary) và không remap nhãn.
# TAG_TO_CLASS = {
#     "epicardial adipose tissue": 1,
#     "pericardium": 2,
#     "phrenic nerve": 3,
#     "aortic root": 4,
#     "auricles": 5,
#     "epicardial fat on aortic": 6,
#     "grasper": 7,
#     "needle holders": 8,
#     "pericardial stay sutures": 9,
#     "pericardium boundary": 10,
# }

