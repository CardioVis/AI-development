device: 'cuda'
seed: 1
fold: 1
debug: False
log: False
data:
  name: 'cardio_vid2_p3'
  num_classes: 25  # 0=background + 24 mask label classes (see class_map.json)
  train_folder: 'data_processed/cardio/vid002_2025-04-01_seg_9m00_to_end/labeled_data'
  val_folder: 'data_processed/cardio/vid002_2025-04-01_seg_9m00_to_end/labeled_data'
  test_folder: 'data_processed/cardio/vid002_2025-04-01_seg_9m00_to_end/labeled_data'
  unlabeled_folder: 'data_processed/cardio/vid002_2025-04-01_seg_9m00_to_end/unlabeled_data'
  save_folder: 'checkpoints/cardio_vid2_p3'
  train_aug: True
  img_size: 224

semi:
  conf_thresh: 0.95

train:
  l_batchsize: 8
  u_batchsize: 2
  num_workers: 4
  num_epochs: 30
  warmup_epochs: 15   # supervised-only warmup before FixMatch consistency kicks in
  folds: [1]          # folds to train; use [1,2,3,4,5] for full 5-fold CV
  num_iters: False
  ema_decay: 0.99
  optimizer:
    mode: 'adamw'
    adamw:
      lr: 1e-4
      betas: [0.9, 0.999]
      eps: 1e-8
      weight_decay: 0.05
    adam:
      lr: 1e-4
      betas: [0.9, 0.999]

test:
  only_test: False
  test_model_dir: ''
  num_workers: 4
  batch_size: 4

model_encoder_id: 0
model_adapt:
  adapt_method: False
  num_domains: 1