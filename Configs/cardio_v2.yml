# FixMatch — dat_kim_goc (Label Studio project-74)
# Paths are relative to AI-development repo root (or overridden via --data_root on Colab).
device: 'cuda'
seed: 1
fold: 1
debug: False
log: False
data:
  name: 'dat_kim_goc'
  num_classes: 18  # 0=background + 17 brush labels (see class_map.json)
  train_folder: 'training_related/dat_kim_goc/labeled_data'
  val_folder: 'training_related/dat_kim_goc/labeled_data'
  test_folder: 'training_related/dat_kim_goc/test_data'
  unlabeled_folder: 'training_related/dat_kim_goc/unlabeled_data'
  save_folder: 'checkpoints/dat_kim_goc'
  train_aug: True
  img_size: 224

semi:
  conf_thresh: 0.95

train:
  l_batchsize: 16
  u_batchsize: 32
  num_workers: 4
  num_epochs: 30
  warmup_epochs: 15
  folds: [1, 2, 3, 4, 5]
  num_iters: False
  ema_decay: 0.99
  optimizer:
    mode: 'adamw'
    adamw:
      lr: 1e-4
      betas: [0.9, 0.999]
      eps: 1e-8
      weight_decay: 0.05
    adam:
      lr: 1e-4
      betas: [0.9, 0.999]

test:
  only_test: False
  test_model_dir: ''
  num_workers: 4
  batch_size: 16

model_encoder_id: 0
model_adapt:
  adapt_method: False
  num_domains: 1
